name: Tier 2 -- headless load

# Runs ONLY on release tags -- never on push/PR to main (AC13 / I3 / C3).
on:
  push:
    tags:
      - 'v*'

jobs:
    # Auth-gate: emit has_key from a step. The `secrets` context is NOT allowed in a
    # job-level `if:` (that made this workflow invalid -> red 0s startup-failure on
    # every push). `needs` IS allowed in a job `if:`, so gate the real job on it.
    gate:
      runs-on: ubuntu-latest
      outputs:
        has_key: ${{ steps.check.outputs.has_key }}
      steps:
        - id: check
          env:
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          run: |
            if [ -n "$ANTHROPIC_API_KEY" ]; then
              echo "has_key=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_key=false" >> "$GITHUB_OUTPUT"
            fi

    headless-load:
      name: Real headless load gate
      runs-on: ubuntu-latest
      needs: gate
      if: ${{ needs.gate.outputs.has_key == 'true' }}

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # C8: install CLI via npm -- plain workflow + bash/jq, not the official GitHub action.
      - name: Install Claude CLI
        run: npm i -g @anthropic-ai/claude-code

      # AC14: exact invocation required by spec.
      # Capture stdout (stream-json NDJSON) to a temp file; stderr goes to the log.
      - name: Run headless plugin load
        run: |
          claude \
            --plugin-dir ./plugins/claude-workspace \
            -p "noop" \
            --output-format stream-json \
            --verbose \
            > /tmp/claude-load-output.ndjson || true

      # AC15 (a)(b)(c): assert pinned init-event paths via check-load.sh.
      # Assertions source agent names from .github/ci/expected.sh (single source -- C4/I4).
      # See .github/ci/PINNED-INIT.md for the pinned JSON shape (C7 / R3).
      - name: Assert init-event (plugin present, all 8 agents, plugin_errors absent-or-empty)
        run: bash .github/ci/check-load.sh /tmp/claude-load-output.ndjson
